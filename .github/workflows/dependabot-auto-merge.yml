name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Dependabot Auto-Merge
    runs-on: ubuntu-latest
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate repository auto-merge prerequisites
        id: repo-prereqs
        uses: actions/github-script@v8
        with:
          script: |
            const repoResponse = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const problems = [];
            if (!repoResponse.data.allow_auto_merge) {
              problems.push('Repository setting allow_auto_merge=false');
            }
            if (!repoResponse.data.allow_squash_merge) {
              problems.push('Repository setting allow_squash_merge=false');
            }

            if (problems.length > 0) {
              core.setFailed(
                `Dependabot auto-merge prerequisites are not satisfied: ${problems.join('; ')}. ` +
                'Apply .github/repository-settings/* with scripts/apply-repository-settings.sh.'
              );
              return;
            }

            core.info('Repository auto-merge prerequisites are satisfied. Workflow approval permission is enforced by the approval step itself.');

      - name: Validate changed files against allowlist
        id: changed-files
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const allowedPatterns = [
              /(^|\/)package\.json$/,
              /(^|\/)pnpm-lock\.yaml$/,
              /(^|\/)package-lock\.json$/,
              /(^|\/)yarn\.lock$/,
              /(^|\/)bun\.lockb$/,
              /(^|\/)npm-shrinkwrap\.json$/,
              /^\.github\/workflows\/[^/]+\.ya?ml$/,
              /^\.github\/dependabot\.ya?ml$/,
            ];

            const changed = files.map((file) => file.filename);
            const disallowed = changed.filter((file) => !allowedPatterns.some((pattern) => pattern.test(file)));

            core.info(`Changed files (${changed.length}): ${changed.join(', ')}`);
            if (disallowed.length > 0) {
              core.warning(`Disallowed files detected: ${disallowed.join(', ')}`);
            }

            core.setOutput('eligible', disallowed.length === 0 ? 'true' : 'false');

      - name: Compute eligibility
        id: eligibility
        env:
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          FILES_ELIGIBLE: ${{ steps.changed-files.outputs.eligible }}
        run: |
          set -euo pipefail

          ecosystem_ok=false
          update_ok=false

          case "$PACKAGE_ECOSYSTEM" in
            npm|npm_and_yarn|github_actions)
              ecosystem_ok=true
              ;;
          esac

          case "$UPDATE_TYPE" in
            version-update:semver-patch|version-update:semver-minor|version-update:semver-major)
              update_ok=true
              ;;
          esac

          eligible=false
          if [[ "$ecosystem_ok" == "true" && "$update_ok" == "true" && "$FILES_ELIGIBLE" == "true" ]]; then
            eligible=true
          fi

          echo "ecosystem_ok=$ecosystem_ok" >> "$GITHUB_OUTPUT"
          echo "update_ok=$update_ok" >> "$GITHUB_OUTPUT"
          echo "eligible=$eligible" >> "$GITHUB_OUTPUT"

          echo "package-ecosystem=$PACKAGE_ECOSYSTEM"
          echo "update-type=$UPDATE_TYPE"
          echo "files-eligible=$FILES_ELIGIBLE"
          echo "eligible=$eligible"

      - name: Auto-approve Dependabot PR
        if: steps.eligibility.outputs.eligible == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                event: 'APPROVE',
                body: 'Auto-approved: eligible Dependabot dependency update in allowed ecosystem and file scope.',
              });
              core.info('Successfully approved PR.');
            } catch (error) {
              if (error.status === 422 && error.message?.includes('already exists')) {
                core.info('Approval already exists; continuing.');
              } else {
                core.setFailed(`Failed to approve PR: ${error.message} (status: ${error.status}). ` +
                  'If using GITHUB_TOKEN, ensure "Allow GitHub Actions reviews to count toward required approval" ' +
                  'is enabled in repo Settings > Actions > General.');
              }
            }

      - name: Enable native auto-merge (squash)
        if: steps.eligibility.outputs.eligible == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }`,
                { pullRequestId }
              );
              core.info(`Enabled auto-merge (squash) for PR #${context.payload.pull_request.number}`);
            } catch (error) {
              if (error.message?.includes('Auto merge is already enabled')) {
                core.info(`Auto-merge is already enabled for PR #${context.payload.pull_request.number}.`);
              } else {
                throw error;
              }
            }

      - name: Log ineligible PR reason
        if: steps.eligibility.outputs.eligible != 'true'
        run: |
          echo "PR is not eligible for auto-merge based on ecosystem, update type, or changed file scope."
