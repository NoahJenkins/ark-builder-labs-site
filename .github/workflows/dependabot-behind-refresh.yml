name: Dependabot Behind Refresh

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - closed
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-behind-refresh
  cancel-in-progress: false

jobs:
  refresh-behind-prs:
    name: Refresh Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Refresh behind Dependabot PRs with auto-merge enabled
        uses: actions/github-script@v9
        env:
          HAS_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' }}
        with:
          github-token: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const blockingCheckConclusions = new Set([
              'action_required',
              'cancelled',
              'failure',
              'stale',
              'startup_failure',
              'timed_out',
            ]);

            async function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function fetchPrDetails(pullNumber) {
              let response;

              for (let attempt = 1; attempt <= 3; attempt += 1) {
                response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });

                const mergeableState = response.data.mergeable_state;
                if (mergeableState && mergeableState !== 'unknown') {
                  return response;
                }

                if (attempt < 3) {
                  core.info(
                    `PR #${pullNumber} mergeable_state is ${mergeableState ?? 'null'} on attempt ${attempt}; retrying in 5s.`
                  );
                  await sleep(5000);
                }
              }

              return response;
            }

            async function collectCheckState(ref) {
              const [checkRuns, combinedStatus] = await Promise.all([
                github.paginate(github.rest.checks.listForRef, {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                }),
                github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref,
                }),
              ]);

              const failedChecks = checkRuns.filter((check) =>
                check.status === 'completed' &&
                blockingCheckConclusions.has(check.conclusion ?? '')
              );
              const pendingChecks = checkRuns.filter((check) => check.status !== 'completed');

              const failedStatuses = (combinedStatus.data.statuses ?? []).filter((status) =>
                ['error', 'failure'].includes(status.state)
              );
              const pendingStatuses = (combinedStatus.data.statuses ?? []).filter((status) =>
                status.state === 'pending'
              );

              return {
                failedChecks,
                failedStatuses,
                pendingChecks,
                pendingStatuses,
              };
            }

            const mergedMainPullRequestEvent =
              context.eventName === 'pull_request_target' &&
              context.payload.action === 'closed' &&
              context.payload.pull_request?.merged === true;

            if (context.eventName === 'pull_request_target' && !mergedMainPullRequestEvent) {
              core.info('Pull request was closed without merge; skipping refresh.');
              return;
            }

            if (context.eventName === 'push' || mergedMainPullRequestEvent) {
              core.info('Waiting 20s for GitHub to recompute mergeability after main advanced.');
              await sleep(20000);
            }

            if (process.env.HAS_ADMIN_TOKEN !== 'true') {
              core.warning('REPO_ADMIN_TOKEN is not configured. GitHub may reject update-branch requests on Dependabot-owned branches.');
            }

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const refreshed = [];
            const skipped = [];

            for (const pr of openPrs) {
              const author = pr.user?.login ?? '';
              const isDependabot = author === 'dependabot[bot]' || author === 'app/dependabot';
              if (!isDependabot) {
                continue;
              }

              const details = await fetchPrDetails(pr.number);

              const autoMergeEnabled = details.data.auto_merge !== null;
              const mergeableState = details.data.mergeable_state;

              if (!autoMergeEnabled || mergeableState !== 'behind') {
                skipped.push(`#${pr.number}:${autoMergeEnabled ? mergeableState : 'auto-merge-disabled'}`);
                continue;
              }

              const checkState = await collectCheckState(pr.head.sha);
              if (
                checkState.failedChecks.length > 0 ||
                checkState.failedStatuses.length > 0 ||
                checkState.pendingChecks.length > 0 ||
                checkState.pendingStatuses.length > 0
              ) {
                const reasons = [
                  checkState.failedChecks.length > 0 ? `failed-checks=${checkState.failedChecks.length}` : null,
                  checkState.failedStatuses.length > 0 ? `failed-statuses=${checkState.failedStatuses.length}` : null,
                  checkState.pendingChecks.length > 0 ? `pending-checks=${checkState.pendingChecks.length}` : null,
                  checkState.pendingStatuses.length > 0 ? `pending-statuses=${checkState.pendingStatuses.length}` : null,
                ].filter(Boolean);

                skipped.push(`#${pr.number}:blocked-${reasons.join('+')}`);
                continue;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                refreshed.push(pr.number);
                core.info(`Requested branch update for PR #${pr.number}.`);
              } catch (error) {
                core.warning(`Failed to update PR #${pr.number}: ${error.message}`);
              }
            }

            core.summary
              .addHeading('Dependabot Behind Refresh')
              .addRaw(`Refreshed PRs: ${refreshed.length > 0 ? refreshed.map((number) => `#${number}`).join(', ') : 'none'}`)
              .addEOL()
              .addRaw(`Skipped PRs: ${skipped.length > 0 ? skipped.join(', ') : 'none'}`)
              .addEOL();
            await core.summary.write();
