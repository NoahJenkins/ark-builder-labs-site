name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress workflows on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict GITHUB_TOKEN permissions to least privilege
permissions:
  contents: read

jobs:
  # Fast checks run first - type checking and linting
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        
      - name: Run TypeScript type checking
        run: pnpm exec tsc --noEmit
        
      - name: Run ESLint
        run: pnpm lint

  jest-tests:
    name: Jest Tests
    runs-on: ubuntu-latest
    needs: typecheck  # Only run if typecheck passes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        
      - name: Run Jest tests
        run: pnpm test
        
      - name: Upload Jest coverage reports
        uses: codecov/codecov-action@v6
        if: always() && hashFiles('coverage/lcov.info') != ''
        with:
          files: ./coverage/lcov.info
          flags: jest
          name: jest-coverage
          fail_ci_if_error: false
        continue-on-error: true

  # Build verification - depends on typecheck
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: typecheck  # Only build if types are valid
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
            
      - name: Setup Next.js cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        
      - name: Build application
        run: pnpm run build

  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: typecheck  # Run in parallel with build to reduce wall-clock CI time
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
            
      - name: Get Playwright version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(node -p 'require("./package.json").devDependencies["@playwright/test"] || require("./package.json").dependencies["@playwright/test"]')
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
        
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-playwright-
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
        
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps
        
      - name: Run Playwright tests
        run: pnpm run test:e2e
        
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore
