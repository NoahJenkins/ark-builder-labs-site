name: Repository Settings Health

on:
  schedule:
    - cron: '11 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-repository-settings:
    name: Verify Repository Automation Settings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify repository automation settings
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');

            const expectedRepo = JSON.parse(fs.readFileSync('.github/repository-settings/repository.json', 'utf8'));

            const repoResponse = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const mismatches = [];
            for (const [key, value] of Object.entries(expectedRepo)) {
              if (repoResponse.data[key] !== value) {
                mismatches.push(`repo.${key}: expected ${value}, got ${repoResponse.data[key]}`);
              }
            }

            if (mismatches.length > 0) {
              core.setFailed(
                'Repository automation settings drift detected. ' +
                `${mismatches.join('; ')}. ` +
                'Re-apply scripts/apply-repository-settings.sh with repo admin credentials.'
              );
              return;
            }

            core.notice(
              'Workflow permission verification is not available to GITHUB_TOKEN because ' +
              'GET /actions/permissions/workflow requires administration:read. ' +
              'Use scripts/apply-repository-settings.sh for full admin verification.'
            );
            core.info('Repository automation settings match the repo-visible tracked config.');
